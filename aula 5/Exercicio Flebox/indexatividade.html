<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styleatividade.css">
</head>
<body>
    <h2>Exercicio Flexbox</h2>

    <p>1° Em linha inferior direita</p>
      <div class="container row-end">
        <div class="card">Card 1</div>
        <div class="card">Card 2</div>
        <div class="card">Card 3</div>
     </div>

       <p>2° Em coluna com espaço no centro</p>
      <div class="container column">
        <div class="card">Card 1</div>
        <div class="card">Card 2</div>
        <div class="card">Card 3</div>
     </div>

      <p>3° Em linha superior direita</p>
      <div class="container flex-end">
        <div class="card">Card 1</div>
        <div class="card">Card 2</div>
        <div class="card">Card 3</div>
     </div>

     <p>4° Em coluna no centro</p>
      <div class="container coluna-centro">
        <div class="card">Card 1</div>
        <div class="card">Card 2</div>
        <div class="card">Card 3</div>
     </div>

     <p>5° Em linha superior no centro</p>
      <div class="container linha-centro">
        <div class="card">Card 1</div>
        <div class="card">Card 2</div>
        <div class="card">Card 3</div>
     </div>


</body>
</html>
