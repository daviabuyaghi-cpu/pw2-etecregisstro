<!DOCTYPE html>
<html lang="pt-pr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Exemplos de display:</h1>

    <h2>display: block</h2>
    <div class="block">Bloco 1</div>
    <div class="block">Bloco 2</div>

    <h2>display: inline</h2>
    <span class="inline">Texto inline 1 </span>
    <span class="inline">Texto inline 2 </span>

    <h2>display: inline-block</h2>
    <div class="inline-block">Elemento  visual 1</div>
    <div class="inline-block">Elemento  visual 1</div>
</body>
</html>
